name: news_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  fluttertoast: ^8.2.8
  flutter_tts: ^4.2.0
  get_controller_plus: ^0.2.1
  http: ^1.2.2
  lottie: ^3.1.3
  shimmer: ^3.0.0
  adb: ^0.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Poppins
      fonts:
        - asset: Assets/Fonts/Poppins-Light.ttf
          weight: 300
        - asset: Assets/Fonts/Poppins-Regular.ttf
          weight: 400
        - asset: Assets/Fonts/Poppins-Medium.ttf
          weight: 500
        - asset: Assets/Fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: Assets/Fonts/Poppins-Bold.ttf
          weight: 700

  assets:
    - Assets/Icons/
    - Assets/Photos/
    - Assets/Icons/FoodIcon/
    - Assets/Icons/PyementMode/
    - Assets/Animation/
